<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoShine — Avaliações</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body data-page="avaliacoes">
  <div class="bg-decor"></div>
  <header class="topbar container">
    <a class="brand" href="index.html">
      <span>AutoShine</span>
    </a>
    <nav class="main-nav">
      <a href="index.html">Início</a>
      <a href="favoritos.html">Favoritos</a>
      <a href="mapa.html">Mapa</a>
      <a href="meus-agendamentos.html">Agendamentos</a>
      <a href="cadastro.html?mode=login">Acessar</a>
    </nav>
  </header>

  <main class="container reveal-root">
    <section class="reviews-summary reveal-item">
      <h1 id="reviews-shop-title">Avaliações do estabelecimento</h1>
      <p class="score"><span class="stars" id="reviews-average-stars">&#9733; 0,0</span></p>
      <p id="reviews-total">Baseado em 0 avaliações</p>
      <button id="toggle-review-form" class="btn btn-primary" type="button">Deixar avaliação</button>

      <form id="review-form" class="review-form hidden" novalidate>
        <div class="field">
          <label for="reviewer-name">Seu nome</label>
          <input id="reviewer-name" name="reviewerName" type="text" placeholder="Ex.: Carlos S." required />
        </div>

        <div class="field">
          <label for="review-rating">Nota</label>
          <select id="review-rating" name="rating" required>
            <option value="">Selecione</option>
            <option value="5">5 - Excelente</option>
            <option value="4">4 - Muito bom</option>
            <option value="3">3 - Bom</option>
            <option value="2">2 - Regular</option>
            <option value="1">1 - Ruim</option>
          </select>
        </div>

        <div class="field">
          <label for="review-comment">Comentário</label>
          <textarea id="review-comment" name="comment" rows="4" placeholder="Conte como foi o atendimento e a qualidade do serviço." required></textarea>
        </div>

        <div class="field-grid">
          <div class="field">
            <label for="review-photo-file">Foto da experiência (opcional)</label>
            <input id="review-photo-file" name="photoFile" type="file" accept="image/png,image/jpeg,image/webp" />
          </div>
          <div class="field">
            <label for="review-photo">URL da foto (opcional)</label>
            <input id="review-photo" name="photoUrl" type="url" placeholder="https://..." />
          </div>
        </div>

        <button class="btn btn-secondary" type="submit">Publicar avaliação</button>
      </form>
    </section>

    <section id="reviews-list" class="reviews-list reveal-item">
    </section>
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
