<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoShine — Lava Jato</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body data-page="perfil">
  <div class="bg-decor"></div>
  <header class="topbar container">
    <a class="brand" href="index.html">
      <span>AutoShine</span>
    </a>
    <nav class="main-nav">
      <a href="index.html">Início</a>
      <a href="favoritos.html">Favoritos</a>
      <a href="mapa.html">Mapa</a>
      <a href="meus-agendamentos.html">Agendamentos</a>
      <a href="cadastro.html?mode=login">Acessar</a>
    </nav>
  </header>

  <main class="container reveal-root">
    <section class="profile-hero reveal-item">
      <div class="profile-carousel" aria-label="Imagens da loja">
        <div class="profile-carousel-track">
          <img class="profile-carousel-slide is-active" src="assets/img/detalhe-premium-estetica.png" alt="Capa do estabelecimento" />
        </div>
      </div>
      <div class="profile-info">
        <h1>Selecione um lava jato</h1>
        <p>Escolha um estabelecimento pela home ou pelo mapa para ver serviços, preços e avaliações reais.</p>
        <a class="btn btn-ghost" href="index.html">Ver lava jatos</a>
      </div>
    </section>

    <section class="profile-details-grid reveal-item" id="profile-details"></section>

    <section class="reveal-item">
      <div class="section-head">
        <h2>Serviços e preços</h2>
        <a href="index.html" class="link">Escolher lava jato</a>
      </div>

      <div class="services-grid"></div>
    </section>
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
