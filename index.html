<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoShine — Lava jatos e estética automotiva</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body data-page="home">
  <div class="bg-decor"></div>

  <header class="topbar container">
    <a class="brand" href="index.html">
      <span>AutoShine</span>
    </a>

    <button class="nav-toggle" aria-label="Abrir menu" aria-expanded="false">
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
    </button>

    <nav class="main-nav">
      <a href="index.html">Início</a>
      <a href="favoritos.html">Favoritos</a>
      <a href="mapa.html">Mapa</a>
      <a href="meus-agendamentos.html">Agendamentos</a>
      <a href="cadastro.html?mode=login">Acessar</a>
    </nav>
  </header>

  <main class="container page-home reveal-root">

    <section class="categories reveal-item">
      <div class="categories-header">
        <h1 class="categories-title">Lava-jatos perto de você</h1>
        <div class="categories-actions">
          <button class="label-location-cta chip chip-action" type="button" id="label-location-cta">📍 Detectar localização</button>
          <a href="mapa.html" class="chip chip-action">&#128506; Ver no mapa</a>
        </div>
      </div>
      <p class="categories-subtitle">Compare preços, avaliações e agende seu serviço em poucos cliques.</p>
      <button id="use-location-btn" type="button" aria-label="Usar minha localização" style="display:none"></button>
      <p class="location-status" id="location-status"></p>
    </section>

    <section class="listing reveal-item">
      <div class="sort-bar">
        <span class="sort-bar-label">Ordenar por</span>
        <div class="sort-bar-chips">
          <button class="chip chip-action is-active" data-sort="default" id="sort-default">⭐ Relevância</button>
          <button class="chip chip-action" data-sort="price" id="sort-price">💰 Mais baratos</button>
          <button class="chip chip-action" data-sort="rating" id="sort-rating">🏆 Melhor avaliados</button>
          <button class="chip chip-action" data-sort="distance" id="sort-distance" style="display:none">📍 Mais próximos</button>
        </div>
      </div>

      <div id="shop-grid" class="shop-grid"></div>
    </section>
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
