<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoShine — Lava jatos e estética automotiva</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body data-page="home">
  <div class="bg-decor"></div>

  <header class="topbar container">
    <a class="brand" href="index.html">
      <span>AutoShine</span>
    </a>

    <button class="nav-toggle" aria-label="Abrir menu" aria-expanded="false">
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
    </button>

    <nav class="main-nav">
      <a href="index.html">Início</a>
      <a href="favoritos.html">Favoritos</a>
      <a href="mapa.html">Mapa</a>
      <a href="meus-agendamentos.html">Agendamentos</a>
      <a href="cadastro.html?mode=login">Acessar</a>
    </nav>
  </header>

  <main class="container page-home reveal-root">

    <section class="categories reveal-item">
      <p class="categories-label">Encontre o lava jato mais próximo de você <button class="label-location-cta chip chip-action" type="button" id="label-location-cta">clique aqui</button></p>
      <button id="use-location-btn" type="button" aria-label="Usar minha localização" style="display:none"></button>
      <p class="location-status" id="location-status"></p>
    </section>

    <section class="listing reveal-item">
      <div class="section-head">
        <h2 id="nearby-title">Lava jatos recomendados</h2>
        <a href="mapa.html" class="chip chip-action">&#128506; Ver no mapa</a>
      </div>

      <div id="shop-grid" class="shop-grid"></div>
    </section>
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
