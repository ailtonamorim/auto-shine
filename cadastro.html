<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoShine — Acesso</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body data-page="cadastro">
  <div class="bg-decor"></div>
  <header class="topbar container">
    <a class="brand" href="index.html">
      <span>AutoShine</span>
    </a>
    <button class="nav-toggle" aria-label="Abrir menu" aria-expanded="false">
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
    </button>
    <nav class="main-nav">
      <a href="index.html">Início</a>
      <a href="favoritos.html">Favoritos</a>
      <a href="mapa.html">Mapa</a>
      <a href="meus-agendamentos.html">Agendamentos</a>
      <a href="cadastro.html?mode=login">Acessar</a>
    </nav>
  </header>

  <main class="container reveal-root">
    <section class="auth-shell reveal-item">
      <div>
        <p class="eyebrow">Acesso rápido</p>
        <h1 id="auth-title">Entrar para usar os serviços</h1>
        <p id="auth-subtitle" class="hero-text">Você pode ver os lava jatos sem login, mas precisa entrar na conta para agendar e avaliar.</p>
      </div>

      <div class="auth-switch" role="tablist" aria-label="Alternar entre login e cadastro">
        <button id="switch-login" class="chip active" type="button" role="tab" aria-selected="true">Entrar</button>
        <button id="switch-signup" class="chip" type="button" role="tab" aria-selected="false">Cadastrar</button>
      </div>

      <div id="login-panel" class="auth-panel">
        <button id="google-login-btn" class="btn btn-google" type="button"><svg class="google-logo" viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Entrar com Google</button>
        <p class="auth-separator"><span>ou entre com email e senha</span></p>

        <form id="login-form" class="booking-form" novalidate>
          <div class="field">
            <label for="login-email">Email</label>
            <input id="login-email" name="email" type="email" placeholder="Ex.: voce@exemplo.com" required />
          </div>

          <div class="field">
            <label for="login-password">Senha</label>
            <input id="login-password" name="password" type="password" placeholder="Digite sua senha" required />
          </div>

          <button class="btn btn-primary btn-block" type="submit">Entrar</button>
        </form>
      </div>

      <div id="signup-panel" class="auth-panel hidden">
      <button id="google-signup-btn" class="btn btn-google" type="button"><svg class="google-logo" viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Continuar com Google</button>
      <p class="auth-separator"><span>ou preencha seus dados</span></p>

      <form id="signup-form" class="booking-form" novalidate>
        <div class="field-grid">
          <div class="field">
            <label for="signup-name">Nome completo</label>
            <input id="signup-name" name="name" type="text" placeholder="Ex.: João da Silva" required />
          </div>
          <div class="field">
            <label for="signup-email">Email</label>
            <input id="signup-email" name="email" type="email" placeholder="Ex.: joao@email.com" required />
          </div>
        </div>

        <div class="field-grid">
          <div class="field">
            <label for="signup-cpf">CPF</label>
            <input id="signup-cpf" name="cpf" type="text" inputmode="numeric" maxlength="14" placeholder="000.000.000-00" required />
            <p id="cpf-validation-msg" class="empty-copy validation-msg"></p>
          </div>
          <div class="field">
            <label for="signup-phone">Telefone</label>
            <input id="signup-phone" name="phone" type="tel" inputmode="numeric" maxlength="15" placeholder="(00) 00000-0000" required />
          </div>
        </div>

        <div class="field-grid">
          <div class="field">
            <label for="signup-password">Senha</label>
            <input id="signup-password" name="password" type="password" minlength="6" placeholder="Mínimo de 6 caracteres" required />
          </div>
          <div class="field">
            <label for="signup-password-confirm">Confirmar senha</label>
            <input id="signup-password-confirm" name="passwordConfirm" type="password" minlength="6" placeholder="Digite novamente" required />
          </div>
        </div>

        <label class="auth-checkbox">
          <input id="signup-terms" name="terms" type="checkbox" required />
          Concordo com os <a href="termos.html" target="_blank" rel="noopener">termos de uso</a> e a <a href="privacidade.html" target="_blank" rel="noopener">política de privacidade</a>.
        </label>

        <button class="btn btn-primary btn-block" type="submit">Criar conta</button>
      </form>
      </div>
    </section>
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
