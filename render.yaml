services:
  - type: web
    name: autoshine
    env: node
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && node prisma/seed.js
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: autoshine-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_LOGIN
        value: admin
      - key: ADMIN_SENHA
        value: autoshine@2024
      - key: GEOCODING_USER_AGENT
        value: AutoShine Marketplace/1.0
      - key: IMAGE_MODERATION_ENABLED
        value: false

databases:
  - name: autoshine-db
    databaseName: autoshine
    user: autoshine
